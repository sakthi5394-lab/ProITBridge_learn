<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction Interface</title>
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Model Prediction</h2>
    <form id="predictionForm">
        <div class="input-group"><label>CLMSEX (use 0 or 1)</label><input type="text" id="input1" required></div>
        <div class="input-group"><label>CLMINSUR (use 0 or 1)</label><input type="text" id="input2" required></div>
        <div class="input-group"><label>SEATBELT (use 0 or 1)</label><input type="text" id="input3" required></div>
        <div class="input-group"><label>CLMAGE</label><input type="text" id="input4" required></div>
        <div class="input-group"><label>LOSS</label><input type="text" id="input5" required></div>
        
        <div class="btn-group">
            <button type="button" class="btn-predict" onclick="makePrediction()">Predict</button>
            <button type="button" class="btn-clear" onclick="clearForm()">Clear</button>
        </div>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    async function makePrediction() {
        const inputs = [
            parseFloat(document.getElementById('input1').value) || 0,
            parseFloat(document.getElementById('input2').value) || 0,
            parseFloat(document.getElementById('input3').value) || 0,
            parseFloat(document.getElementById('input4').value) || 0,
            parseFloat(document.getElementById('input5').value) || 0
        ];

        try {
            const response = await fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: inputs })
            });
            
            const result = await response.json();
            const resultDiv = document.getElementById('result');
            
            if (response.ok) {
                resultDiv.style.display = 'block';
                resultDiv.innerText = `Atonomy Prediction: ${result.prediction}`;
            } else {
                alert(`Backend Error: ${result.error}`);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Failed to connect to the prediction server. Make sure app.py is running.');
        }
    }

    function clearForm() {
        document.getElementById('predictionForm').reset();
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';
        resultDiv.innerText = '';
    }
</script>

</body>
</html>
